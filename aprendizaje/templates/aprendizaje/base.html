<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Talking Hands{% endblock %}</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>

<body>

<header>
    <h1>Talking Hands</h1>

<nav>

    

    {% if user.is_authenticated %}
        <a href="{% url 'inicio_usuario' %}">Inicio</a>
        <a href="{% url 'logout' %}">Cerrar sesión</a>

    {% else %}
        <a href="{% url 'inicio' %}">Inicio</a>
        <a href="{% url 'login' %}">Iniciar sesión</a>
        <a href="{% url 'registro' %}">Registrarse</a>

    {% endif %}

</nav>

    <hr>
</header>

<main>

{% block content %}

{% endblock %}

</main>

</body>
</html>
